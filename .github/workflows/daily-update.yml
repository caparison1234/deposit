name: Daily Rate Update

on:
  schedule:
    - cron: '10 0 * * *'  # 09:10 KST (UTC+9)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect CMA rates
        run: python scripts/collect_cma.py
        continue-on-error: true

      - name: Collect deposit rates
        run: python scripts/collect_deposit.py
        continue-on-error: true

      - name: Build static site
        run: python build.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dist/
          git diff --staged --quiet || git commit -m "chore: daily rate update $(date +'%Y-%m-%d')"
          git push

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
