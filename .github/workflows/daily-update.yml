name: Daily Rate Update

on:
  schedule:
    - cron: '10 0 * * *'  # 09:10 KST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect CMA rates
        run: python scripts/collect_cma.py
        continue-on-error: true

      - name: Collect deposit rates
        run: python scripts/collect_deposit.py
        continue-on-error: true

      - name: Collect parking rates
        run: python scripts/collect_parking.py
        continue-on-error: true

      - name: Collect ETF prices
        run: python scripts/collect_etf.py
        continue-on-error: true

      - name: Build static site
        run: python build.py

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: "chore: daily rate update"
